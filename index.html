<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="Spaced repetition app for learning Mandarin Chinese" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <title>Hanzi Memory Recall</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Unregister any stale service workers from old PWA setup
      (function() {
        var needReload = false;
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            if (registrations.length > 0) {
              needReload = true;
              registrations.forEach(function(registration) {
                registration.unregister();
              });
            }
          });
          // Clear all caches from old PWA
          if ('caches' in window) {
            caches.keys().then(function(cacheNames) {
              if (cacheNames.length > 0) {
                needReload = true;
                cacheNames.forEach(function(cacheName) {
                  caches.delete(cacheName);
                });
              }
            });
          }
          // Reload once to clear stale service worker
          if (needReload && !sessionStorage.getItem('sw-cleared')) {
            sessionStorage.setItem('sw-cleared', 'true');
            window.location.reload();
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
